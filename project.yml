name: KillTeamCards

options:
  bundleIdPrefix: com.killteamcards
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  KillTeamCards:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: KillTeamCards
        excludes:
          - Resources/PDFs
          - Resources/PDFs/**
          - Info.plist
    resources:
      - path: KillTeamCards/Resources/faction-manifest.json
      - path: KillTeamCards/Resources/PDFs
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.killteamcards.app
        INFOPLIST_FILE: KillTeamCards/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_PREVIEWS: "YES"
